<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>图寻 AI 插件下载</title>
    <link rel="stylesheet" href="./styles.css?v=20260429" />
  </head>
  <body>
    <main class="download-page">
      <section class="download-hero">
        <p class="eyebrow">TuXun AI Extension</p>
        <h1>图寻 AI 浏览器插件</h1>
        <p class="lede">网页端已停用，后续功能会集中维护插件端。下载压缩包后，在 Chrome 扩展管理页加载即可使用。</p>
        <div class="download-actions">
          <a class="download-button" href="./dist/TuXunAI.zip" download>下载插件 ZIP</a>
          <span class="download-note">服务启动时会自动打包，extension 文件夹变化后会重新生成。</span>
        </div>
      </section>

      <section class="install-steps" aria-label="安装步骤">
        <h2>安装步骤</h2>
        <ol>
          <li>下载并解压 TuXunAI.zip。</li>
          <li>打开 chrome://extensions，开启开发者模式。</li>
          <li>选择“加载已解压的扩展程序”，指向解压后的文件夹。</li>
          <li>启动本地服务后，点击插件图标开始识图。</li>
        </ol>
      </section>
    </main>
  </body>
</html>
