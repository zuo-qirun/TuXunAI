{"success":true,"data":{"public":{"_id":"japan","createdAt":"2025-09-07T21:15:12.477Z","updatedAt":"2025-12-05T00:00:00.000Z","lastUpdatedBy":"","title":"Japan","slug":"japan","code":"JP","cat":["Asia"],"heroImage":"/images/japan/fuji-mountain-in-autumn-822273028-5a6a8a9c3418c600363958d3.jpg","headerNotes":[],"steps":[{"kind":"tip","title":"Identifying Japan","items":[{"kind":"centeredImage","imageUrl":"/images/japan/0_1.png"},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/2.png","imageLink":"/images/japan/2.png","alt":"","width":0.417},"text":["Japan consists of three main terms used to identify land, groupings and borders: Islands, Regions and Prefectures.","- [**Islands**](https://th.bing.com/th/id/R.7efa01a909fe9fb8de92cac3188595c5?rik=lzOfSo4f%2f7xViQ&pid=ImgRaw&r=0): The four main islands that make up the country of Japan. From the top they are: Hokkaido, Honshu, Shikoku and Kyushu.","- [**Regions**](https://imgur.com/iHUwgky): Some islands are further broken down into groupings of prefectures.","- [**Prefectures**](https://upload.wikimedia.org/wikipedia/commons/b/bc/Regions_and_Prefectures_of_Japan_2.svg): These form the currently 47 different subdivisions within the country.","Many of these names are used in this guide, on maps, and when referring to areas of Japan. Therefore, it is recommended to learn and become comfortable with each category, and the titles within."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/3.png","imageLink":"https://goo.gl/maps/odTCEn4Q1yXZwbge9","alt":"","width":0.417},"text":["The appearance of the standard Japanese Google car is often **black and white**. You may find it in [black](https://www.google.com/maps/@39.545526,140.3963943,3a,75y,199.92h,63.31t/data=!3m7!1e1!3m5!1sULSsNXwYSpwiLMrI-UT9Sg!2e0!5s20120901T000000!7i13312!8i6656?entry=ttu) or rarely with an [antenna](https://goo.gl/maps/4eZr42n9iQuCjk9f9).","In addition, due to privacy reasons, the camera is intentionally set lower to the ground. This is known as **low-cam**. You can identify it by:","- Looking downwards. The blur will be noticeably larger.","- The road will look wider, and objects will be viewed from a lower perspective.","NOTE: The only other country that always has low-cam is [Switzerland](https://goo.gl/maps/NgSfAc8sDEh4reQy7). It can also be seen in Generation 4 coverage in [Sri Lanka](https://goo.gl/maps/DisPbnfvKkJdXc3TA). Also, the car will be blurred in Switzerland."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/4.png","imageLink":"https://goo.gl/maps/1rpP5aVgpPeruGDy5","alt":"","width":0.417},"text":["Japan drives on the **left** **hand **side of the road.","NOTE: Hong Kong drives on the left hand side of the road, same as Japan. South Korea and Taiwan drive on the right hand side instead."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/5.png","imageLink":"/images/japan/5.png","alt":"","width":0.417},"text":["Japanese is written with a mixture of **three main systems**: kanji and two syllabic scripts: hiragana and katakana. Formal signs and texts will mostly use kanji and hiragana. The kanji system is directly borrowed from Chinese and thus looks very similar, while the syllabic scripts are more loosely inspired by Chinese. Hiragana generally looks simpler than Chinese characters, many of the symbols have loops, which are not present in Chinese. The shapes are also typically slightly softer than the shapes present in most kanji.","_You can learn more about hiragana, katakana and kanji in the region guessing section, learning frequent terms and names._"]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/6.png","imageLink":"/images/japan/6.png","alt":"","width":0.417},"text":["Katakana is mainly used for loan words, and are thus common to find in commercials. They are generally quite simple, with a lot of geometrical shapes rather than the more artistic shapes present in hiragana and kanji."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/7.png","imageLink":"/images/japan/7.png","alt":"","width":0.417},"text":["On the left hand side you can find the pronunciation and meaning of eight of the most commonly featured kanji in town and city names. Learning to recognise these can make finding cities considerably easier.","On the right you see the shape and pronunciation of the cardinal directions and the shape of some kanji commonly found at the end of place names. If you see the kanji for prefecture or city, chances are you will be able to find it fairly quickly. Wards are typically findable granted you know the city, while towns are often fairly difficult to locate.","NOTE: Most of these kanji have alternative, less common pronunciations."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/8.png","imageLink":"https://goo.gl/maps/wM1xqAHv1ptekU2x7","alt":"","width":0.417},"text":["Japanese architecture has many distinct and expressive styles, with many unique buildings. These can range from [traditional](https://goo.gl/maps/aUpwpwffnDBSAmHT6) country houses, regional designs, [modern](https://goo.gl/maps/zGecH29hE49UmfW57) large cities, [coastal](https://goo.gl/maps/EXtb15cfQano1fwK7) reinforced buildings, and anything in between.","_You can learn more about different types of architecture and styles in the region guessing section._"]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/9.png","imageLink":"https://goo.gl/maps/1zHvtpquCDfZ1MaA9","alt":"","width":0.417},"text":["Japan mostly uses these **round concrete** poles, which have these screw-like extensions. Other information can often be found on or attached to the pole including:","- Electrical plates.","- Guy-wires.","- Pole reflectors.","Therefore, they are a key asset in region guessing Japan.","_You can learn more about plates, reflectors, and guy-wires in the region guessing section._"]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/10.png","imageLink":"https://goo.gl/maps/ktpx5k8gscjBLT2U8","alt":"","width":0.417},"text":["You can find a variety of pole reflectors in Japan. They are typically short and **do not **touch the ground. Common patterns found all across Japan include:","- Yellow [vertical stripes](https://goo.gl/maps/7BqmnkTQC1MVKsfy7).","- Yellow [diagonal stripes](https://goo.gl/maps/y7e5UtxMuFbPtM2LA).","- Vertical or diagonal [white stripes](https://maps.app.goo.gl/9oGeT8mpLgDfZjYK7).","NOTE: The [Taiwanese variant](https://goo.gl/maps/t6yb5Q4LZtRinPRQ7) has diagonal stripes that reach the ground. The [South Korean ones](https://goo.gl/maps/pcSbJznpLXenKtWX9) have diagonal, thicker stripes.","_You can learn more about the different regional reflectors in the region guessing section._"]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/11.png","imageLink":"/images/japan/11.png","alt":"","width":0.417},"text":["Japan uses a standard **short white** licence plate with green text. You will often see a different short yellow version with black text issued to “light automobiles”, otherwise known as Kei Cars."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/12.png","imageLink":"https://goo.gl/maps/hRHrPi9F5fcnrsAJA","alt":"","width":0.417},"text":["Japan has three common variations of road lines. They are as follows:","- The most common being white, solid outer lines with a [dashed white](https://goo.gl/maps/ydLiQ19hdgbTekD86) middle line.","- White solid sidelines with a [yellow solid](https://goo.gl/maps/mPCxbst43hVaZXcP6) middle line.","- White solid sidelines with [yellow and white](https://goo.gl/maps/Vcdsq6sH8EQkhnUp6) middle lines.","While you may find other, more rare combinations, Japan will never have yellow outside road lines."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/13.png","imageLink":"https://goo.gl/maps/sWw71hqmJwYbek9f6","alt":"","width":0.417},"text":["Japan usually uses simple white bollards with **circular reflector(s)** on the top. However, sometimes these bollards are [black](https://goo.gl/maps/cejvLnBS8MeHHbuU8), or have [other extensions](https://goo.gl/maps/DaSsHqZhpkmU3Duq8). They can also have the city or prefecture written on it in kanji.","_You can learn more about the bollards and kanji in the region guessing section._"]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/14.png","imageLink":"https://goo.gl/maps/UeN6H9tb5nC5hhv56","alt":"","width":0.417},"text":["Japan generally uses these simple, **white** guardrails.","_You can learn more about the exceptions in the region guessing section._"]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/15.png","imageLink":"https://goo.gl/maps/6PsFbdz9gtDyGWbs9","alt":"","width":0.417},"text":["Prefecture roads are identified by their **hexagonal-shaped** shields. The prefecture is often written under the road number in kanji. While the shield design remains, other variations can be found:","- On [prefectural highway shields](https://goo.gl/maps/6PsFbdz9gtDyGWbs9) (with kanji).","- On directional [intersection](https://goo.gl/maps/jsWfsJUW3r7JjE8v5) signs.","- Or on small, directional [arrow](https://goo.gl/maps/WrtbZh2DYQ6B4YYh7) signs.","As multiple prefectures can have the same road number, it is recommended to first find the prefecture you are in."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/16.png","imageLink":"https://goo.gl/maps/qFGTwrDqnHvFUxa28","alt":"","width":0.417},"text":["Some frequently seen infrastructure in Japan consists of:","- This unique [stop sign](https://goo.gl/maps/RYbbcM52HxH5rjvB6).","- A school [pedestrian crossing](https://maps.app.goo.gl/kp1Biy8pumCZtfsu5).","- And these traffic [mirrors](https://goo.gl/maps/RvMvRRrnmGWL4Z9CA).","While many infrastructural clues exist, these three are very common, and may very well help you identify Japan on a difficult round."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/17.png","imageLink":"https://goo.gl/maps/s5JbkirV8CYYjgKw7","alt":"","width":0.417},"text":["**Retaining walls** can be an excellent clue for Japan in rural areas with little to no information."]}}]},{"kind":"tip","title":"Regional and prefecture-specific clues","items":[{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/jp_areacodes_darkmode.png","imageLink":"#","alt":"","width":0.573},"text":["**Area codes** are commonly found throughout the country and increase to the south.","NOTE: Area codes ending with a 0 are often not regional, most notably 0120."]}},{"kind":"divider","title":"Infrastructure"},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/21.png","imageLink":"/images/japan/21.png","alt":"","width":0.573},"text":["Every region in Japan features a **distinct plate** on their utility poles."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/38.png","imageLink":"/images/japan/38.png","alt":"","width":0.573},"text":["The **pole reflector pads** vary by region in Japan."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/39.png","imageLink":"/images/japan/39.png","alt":"","width":0.573},"text":["You can narrow down the prefecture you are in based on the style of [**road diamond**](https://maps.app.goo.gl/NS6jWyqSa1zRFmTd6)."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/37.png","imageLink":"/images/japan/37.png","alt":"","width":0.573},"text":["Most Japanese prefectures have unique stickers you can find on their signposts."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/jp_guywires_copy.png","imageLink":"/images/japan/20.png","alt":"","width":0.573},"text":["Most regions in Japan have unique **guy wires**.","NOTE: Only the most consistent ones are on this map."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/22.png","imageLink":"https://goo.gl/maps/eAAFvQmmADNf3J6C9","alt":"","width":0.573},"text":["You may sometimes find an **orange arrow** located above the top most pole plate in Chugoku."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/23.png","imageLink":"https://goo.gl/maps/Uu2qrKToJgsdxNYs8","alt":"","width":0.573},"text":["These **orange and black bands **wrapped around poles can often be found in Shikoku."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/24.png","imageLink":"https://maps.app.goo.gl/1fmpUUkAKqwshL7f9","alt":"","width":0.573},"text":["These attachments with an approximately **120-degree angle **can commonly be found on poles in Kansai.","NOTE: Sometimes there is no angle, and instead just an [angled downward attachment](https://maps.app.goo.gl/LM3HD3nFCYj27xMUA)."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/25.png","imageLink":"https://maps.app.goo.gl/bwypJbQDAXz4yUv98","alt":"","width":0.573},"text":["These smaller attachments with a **90-degree angle **can commonly be found on poles in Shikoku."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/26.png","imageLink":"https://maps.app.goo.gl/vxrc8aYqGXDnmM5HA","alt":"","width":0.573},"text":["The electrical poles in Hokkaido either have this [**plus-shaped bar**](https://maps.app.goo.gl/vxrc8aYqGXDnmM5HA) attached to the **side** of the pole, or one transformer mounted on [**two bars**](https://maps.app.goo.gl/ySYEqmRFjMEMEwhc7).","However, if there is more than one transformer, they will often be mounted on the sides of a **square**.","NOTE: While the Kanto transformer may also be mounted on two bars, Hokkaido will never have a wooden plate."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/27.png","imageLink":"https://maps.app.goo.gl/rsskJQp9oPpGdPDR9","alt":"","width":0.573},"text":["The transformers in Tohoku, which often have additional square holding brackets and the logo of the Tohoku Electrical Company, are sometimes mounted on a **round plate** with a **zigzag bar**.","Furthermore, you may also find transformers mounted on the **side** **of a** **square**, with a straight bar mounted on the top of the square. Rarely, you may find a square without a bar.","NOTE: While Kansai may have a square attachment as well, the bar will be mounted on the bottom rather than the top."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/28.png","imageLink":"https://maps.app.goo.gl/yF8PkEfCbKfek7FTA","alt":"","width":0.573},"text":["The transformers in Kanto, which can have [three](https://maps.app.goo.gl/UyMb991t8fkqFCwZ7) or [two insulators](https://maps.app.goo.gl/cKBTRWDiWHRFbbPw6), are often mounted on a [**wooden plate**](https://maps.app.goo.gl/yF8PkEfCbKfek7FTA) and two bars, or a [round plate](https://maps.app.goo.gl/7jHgmppBUEg2Po5w6) and a T-shaped bar.","NOTE: While the Hokkaido transformer may also be mounted on two bars, it will never have a wooden plate. Kanto ones can also be mounted without a wooden plate."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/29.png","imageLink":"https://maps.app.goo.gl/QdBDp1XjEBYwM7y36","alt":"","width":0.573},"text":["The transformers in Hokuriku, which are attached with thin metal bars, often have these [**small “lamp” shaped insulators**](https://maps.app.goo.gl/52GKXLANS9PNefQv9). There will **never** be a bar present except for the attachment mentioned above.","NOTE: The prefecture of Niigata will have the Tohoku transformer design, as opposed to Hokuriku one."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/30.png","imageLink":"https://maps.app.goo.gl/HGLz9BBt5ixtvtPCA","alt":"","width":0.573},"text":["The transformers in Chubu, which often have painted **yellow numbers** and **black “tap” connectors**, are either attached with [**large** **triangle and horizontal bars**](https://maps.app.goo.gl/HGLz9BBt5ixtvtPCA), or these [**thin metal brackets**](https://maps.app.goo.gl/8kXAdcaVBaDhy2v56)."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/31.png","imageLink":"https://maps.app.goo.gl/5VXH183VYs6v4NuWA","alt":"","width":0.573},"text":["The transformers in Kansai have either a **straight **or **zigzag bar** mounted on the **bottom** of a **square**. The transformer(s) will be mounted on the sides of that same square.","While this is uncommon, the bar and transformer(s) may be mounted on a [**vertical bar**](https://maps.app.goo.gl/kHToBhThugutvWjY9), rather than a square.","NOTE: While Tohoku may have a square attachment as well, the bar will be mounted on the **top** rather than the bottom."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/32.png","imageLink":"https://maps.app.goo.gl/gYFTVk2dexinfJ2H6","alt":"","width":0.573},"text":["The transformers in Chugoku, which have a **cross-shaped bar** attached in the **middle** of the pole, mounted by a **full triangle**, will have a **long horizontal **or [**short vertical**](https://maps.app.goo.gl/C47yQpCXaFeQ5sARA)** insulator(s)** at the end.","A white sticker will often be stuck to the bottom of the transformer with **red numbers**. They may also be painted on the **side**."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/33.png","imageLink":"https://maps.app.goo.gl/yV53cRegcjBHE3HMA","alt":"","width":0.573},"text":["The transformers in Shikoku, which also have a **cross-shaped bar **attached in the **middle** of the pole, mounted by a **half triangle**, will have [**“hat shaped”** **short horizontal insulators**](https://maps.app.goo.gl/kFzbZ6yh1rfAGQV88) at the end.","A white sticker will often be stuck to the bottom of the transformer with **black numbers**."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/34.png","imageLink":"https://maps.app.goo.gl/omsHGdwiTjBhucag8","alt":"","width":0.573},"text":["The transformers in Kyushu, which have a **straight bar** attached on the **side** of the pole with **three insulators** at the end, will have transformers mounted **180-degrees** from one another."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/35.png","imageLink":"https://maps.app.goo.gl/qLoT3tpzg29zoAws9","alt":"","width":0.573},"text":["Transformers in Okinawa, which have a **T-shaped bar** attached on the **side** of the pole, will have transformers mounted on **opposite sides** of the pole."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/36.png","imageLink":"https://maps.app.goo.gl/JD4uh4T6KvfAtnf78","alt":"","width":0.573},"text":["These **grey “insulator-esque” blocks**, which wires are fed through, can be found in the regions of Chubu, Kansai, Chugoku, Shikoku, and very rarely in Hokkaido."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/51.png","imageLink":"https://goo.gl/maps/3Vv61SnDHDxeSWhn7","alt":"","width":0.573},"text":["This pole top, with **four thicker bars** and a **circle** **piece** at the top, is common in the Chubu region."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/52.png","imageLink":"https://goo.gl/maps/VQtFcRH2RaJJGuFCA","alt":"","width":0.573},"text":["This pole top, with **two sides filled in** and shaped like a **tent**, is common in the Hokuriku region."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/53.png","imageLink":"https://goo.gl/maps/xJVe1sFKLXd9mLRn6","alt":"","width":0.573},"text":["This pole top, with **four thin, skinny bars**, is common in the Chugoku region."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/54.png","imageLink":"https://goo.gl/maps/S5iSLiYT4qrDw5eC7","alt":"","width":0.573},"text":["This tuning fork pole top, with a **long top bar** that sticks out each end and **horizontal bar(s) **below, is found the majority of the time in the Kanto region."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/55.png","imageLink":"https://goo.gl/maps/FtNwNSND7A9tf891A","alt":"","width":0.573},"text":["This tuning fork pole top, with a **short top bar **and **horizontal bar** below, is found the majority of the time in the Chubu region."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/56.png","imageLink":"https://goo.gl/maps/fSFkH2fXwnvsyjFH7","alt":"","width":0.573},"text":["This tuning fork pole top, with a **thin wire** and **horizontal bar **below, is common in the Kansai region."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/46.png","imageLink":"https://goo.gl/maps/EpwKVE4UXme6WtAS8","alt":"","width":0.573},"text":["This infrastructural **arrow** informs drivers of where the shoulder line is when under snow, and is located almost exclusively in **Hokkaido**.","NOTE: While much more rare, other variations can be found here:","- This arrow, found in the Aomori prefecture (or more rarely Hokkaido), has distinct [silver bolts](https://goo.gl/maps/Wzi6Ck3BdAB4sY5bA) around the border.","- This variation, found in the Gifu prefecture, is [long and thin](https://goo.gl/maps/fW4rPrBMBpjc1jvw6).","- This alternate [yellow and black](https://goo.gl/maps/JkwqhdWszVzfhDEm6) design can often be found on the northern part of National Highway 275 in Hokkaido.","- This [yellow and green](https://goo.gl/maps/coTFwyXtYaPsfbku6) arrow is found southwest of Sapporo.","- This [yellow and black](https://goo.gl/maps/rsRHBpDVhF9uaHSv9) arrow can be found on Hokkaido."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/40.png","imageLink":"https://goo.gl/maps/Ya9ccr3PW7DDrgpA7","alt":"","width":0.573},"text":["This flat, white bollard, found on the island of Kyushu and in Yamaguchi Prefecture, will have a **series of separated orange reflectors** on one side, and the same white on the opposite.","NOTE: Rarely, you may find similar bollards in Hokkaido. However, both sides will have orange reflectors."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/41.png","imageLink":"https://goo.gl/maps/heorE3E5xJFhGBT67","alt":"","width":0.573},"text":["Some bollards on the island of Shikoku can have a** black stripe** just under the reflector. They can be found normally, attached to [guardrails](https://goo.gl/maps/dMX9b98ZsCAwWVm27) or [walls](https://goo.gl/maps/ibVKyN6TkXVVCgNm7)."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/42.png","imageLink":"https://goo.gl/maps/R5aeT18Vmf3Hd73HA","alt":"","width":0.573},"text":["This **thick**, white bollard, found in the Tohoku region, will have an **octagonal** reflector, and **yellow stripe** just underneath. In addition, you can find the same bollard, but with a [rectangular](https://goo.gl/maps/csG4xahLJ65kQnSf6) top.","Finally, there are two other variations. You can find a black [octagonal](https://maps.app.goo.gl/Sfi2HnuEoh8LvJNW6), and [rectangular](https://goo.gl/maps/DaNEMrzzZ1K42SsW9) version. They are often found on National Highways or Expressways and can have the number printed on them."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/43.png","imageLink":"https://goo.gl/maps/u7esDUXY9vjNY1bR8","alt":"","width":0.573},"text":["This bollard, much like Tohoku, will be a **thick**, white bollard with an **octagonal** reflector. However, this Akita prefecture variation will have **two yellow stripes **underneath the reflector."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/44.png","imageLink":"https://goo.gl/maps/6gSAQ4Zfkb5sKJCo7","alt":"","width":0.573},"text":["The Toyama prefecture bollard has **one reflector**, is [**extendable**](https://goo.gl/maps/dYgsuVzTtVHRbVrj7) and has a **red stripe** underneath the reflector.","NOTE: Be careful: if there is either a second reflector, or a yellow stripe instead of a red one, these are different bollards. These are more common variations found across many prefectures."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/45.png","imageLink":"https://maps.app.goo.gl/ptkUnvbfhLD5AQc1A","alt":"","width":0.573},"text":["This bollard, with an **octagonal** reflector, and **red stripe** underneath it, is exclusive to the Okayama prefecture. Additionally, there will be a sloped connection where the base meets the reflector."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/47.png","imageLink":"https://goo.gl/maps/wnvVeDbRET9pHh749","alt":"","width":0.573},"text":["This bollard, found in the Aomori prefecture, has **two yellow stripes**, a **single circular reflector**, and is **extendable**. Sometimes, only [one thicker stripe](https://goo.gl/maps/FznLNbxyMicDGqgaA) near the top may be present."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/48.png","imageLink":"https://maps.app.goo.gl/ZLd2tLSLQw1sDj319","alt":"","width":0.573},"text":["These striped bollards (which cover over the original) have a **thinner** top half, and **no reflectors**, and are common to the Tohoku region. They are especially common in Akita prefecture."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/50.png","imageLink":"https://goo.gl/maps/C7KUcChCqa9Qzxqu9","alt":"","width":0.573},"text":["In the northern parts of the Chugoku region, you can primarily find these basic snow poles, with either a **thin** **extended**, or **thin contracted** top. They can also sometimes be found in Iwate."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/49.png","imageLink":"https://maps.app.goo.gl/835g94q4pnJeX9aP7","alt":"","width":0.573},"text":["Green bands on guardrails are most commonly found in Oita and Miyazaki, but can be found on all of Kyushu."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/57.png","imageLink":"https://goo.gl/maps/p5AD1AFt15JLpKd56","alt":"","width":0.573},"text":["These distinctive **yellow **guardrails can be found in the Yamaguchi Prefecture."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/58.png","imageLink":"https://goo.gl/maps/SQR7xhoXueNkspxD9","alt":"","width":0.573},"text":["You can find these **chevron-like** stickers, or more rarely orange ones, on guardrails** **in Hokkaido.","- On the [end](https://goo.gl/maps/9JKVotxnj4pqYvLz7) or side of a guardrail.","- Stuck to [metal posts](https://goo.gl/maps/iJBcacVCiaUCobVb8) between wire fences, which are often found in Hokkaido.","- On railings, which are often found on bridges, [underneath](https://goo.gl/maps/S75JPZKg6eYzrfAG6) the inside of the railing."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/59.png","imageLink":"https://goo.gl/maps/MpJUvHdQWNQSAZk5A","alt":"","width":0.573},"text":["Guardrail endings with these **red and yellow** striped stickers can commonly be found across Chugoku, except in Yamaguchi. They can also rarely be found in Niigata."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/60.png","imageLink":"https://goo.gl/maps/yEHadQiwBBJpUH9s6","alt":"","width":0.573},"text":["Vertical traffic lights can be found in Hokkaido, and along the northwestern coast. The usual [horizontal traffic lights](https://goo.gl/maps/wL83475gQqPcevLW9) can be found everywhere else."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/61.png","imageLink":"https://goo.gl/maps/3MhXHAam9CCP5NzJ8","alt":"","width":0.573},"text":["These specific **black **signs with **two yellow circles** are found in Kagawa. Other variations can be seen, including them [stacked](https://goo.gl/maps/vu57GaqMEYEVbA8h6) on top of each other, or with an [arrow attached](https://goo.gl/maps/ijaCjxnsvDk9ohwZ7) above."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/62.png","imageLink":"https://maps.app.goo.gl/UoWFLnAqM869yckC9","alt":"","width":0.573},"text":["Kerosine tanks, otherwise known as “Claymores”, can be found more commonly the further **north** you go. They are abundant in Hokkaido, but can be found in prefectures south of it, or in high elevation mountainous areas."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/63.png","imageLink":"https://goo.gl/maps/zMmW8ZMv71WRfEGk8","alt":"","width":0.573},"text":["Hot water, gas and propane tanks can be found more frequently in **northern** prefectures or high elevation mountainous areas. Here are a few common variations you can find:","- The standard [hot water tank](https://goo.gl/maps/WPocxwCcZguGUn9z7).","- [Covered](https://goo.gl/maps/JDeGep9WhjT672Gb6) propane tanks.","- [Exposed](https://goo.gl/maps/ZinuXP8pGdw2bmi89) propane tanks.","- These [cylindrical](https://goo.gl/maps/kGsvLXq7p4ekVuw39) tanks.","- And finally, these [circular](https://goo.gl/maps/8esQoGWDtj3uAwvi8) tripod tanks.","Moreover, these are even more common in rural towns or villages, where major water or gas lines are unavailable."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/64.png","imageLink":"https://goo.gl/maps/bXJ28xTjNUTeBdQX8","alt":"","width":0.573},"text":["Snow prevention roads, known as ‘Shosetsu’, are found mainly in northwest coastal prefectures. They appear as **tiny circles **in the pavement, and spray warm underground water to clear snow."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/65.png","imageLink":"https://goo.gl/maps/84ow9jzo7dmP6iBU8","alt":"","width":0.573},"text":["Cycling routes in **Ehime** use an outside white, with an inside **blue **line. They are more commonly found along the coast but may be found further inland too.","While exceptions do exist, and can be found in other prefectures, they are the extreme minority."]}},{"kind":"divider","title":"Architecture"},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/66.png","imageLink":"https://maps.app.goo.gl/JNPhZA8GpkyKo4Bs7","alt":"","width":0.573},"text":["These unique **red-tiled** roofs are most commonly found in **Chugoku**, especially in the prefectures of Hiroshima and Shimane."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/67.png","imageLink":"https://goo.gl/maps/p7xARcckvhYLtjFn9","alt":"","width":0.573},"text":["The further you are **north**, roofs generally transition from tiled to level or flat sloped in order to compensate for heavy snowfall. Northern houses often have **ladders** attached to the side, giving roof access to clear snow.","NOTE: In addition to north to south, high-elevation mountainous regions or high snowfall areas often use such roofs, even in more central or southern prefectures."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/77.png","imageLink":"https://maps.app.goo.gl/ZJNhYgy5tcVHuTBWA","alt":"","width":0.573},"text":["Okinawa can often be recognised by the white concrete buildings with flat roofs."]}},{"kind":"divider","title":"Landscape and vegetation"},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/68.png","imageLink":"https://goo.gl/maps/Xyh7eC6Fcqnr7ZEk8","alt":"","width":0.573},"text":["[Giant butterbur](https://en.wikipedia.org/wiki/Petasites_japonicus) (commonly referred to as cabbage) is abundant in **Hokkaido** and some northern prefectures. Plants found south of Hokkaido often have [smaller leaves](https://goo.gl/maps/H79sWvJQ7NUy5EWe9). It is often found growing along the roadside.","NOTE: Cabbage is also found on the island of [Sakhalin](https://goo.gl/maps/cDP6L1rjVAQxszS46), Russia. However, the Google car will not have low-cam there."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/69.png","imageLink":"https://goo.gl/maps/eu5NGQRbjdaVnhgU6","alt":"","width":0.573},"text":["Green tea plants are often grown in hedged rows. You will often see these [fans](https://goo.gl/maps/v7nZn3mNyfSH2Bp19) mounted on poles, which serve the purpose of preventing frost from falling on the plants.","The prefectures of **Shizuoka (36%)** and **Kagoshima (34%)** make up the majority of the production, with Mie (7%), Miyazaki (4%), and other prefectures (17%) making up the minority."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/70.png","imageLink":"https://goo.gl/maps/2wQ94M35BTB4mcJJ6","alt":"","width":0.573},"text":["Rice is mainly produced north of **Tokyo**. During [growth](https://goo.gl/maps/UenU6cmsX3yayDDN7), it resembles straws of grass. And when ready for [harvest](https://goo.gl/maps/xFmiecFYsthvxdeJA), brown husks are visible. They are also commonly planted in [beds of water](https://goo.gl/maps/oroCCdPYkD6zY7CR8).","The regions of Chubu (21%), Kanto (15%), Tohoku (27%), and Hokkaido (7%) make up the majority of production."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/71.png","imageLink":"https://goo.gl/maps/sXDARqf36ECLGA6w7","alt":"","width":0.573},"text":["Japanese White Birch grows dominantly in the **Chubu and Hokkaido **regions, and to a lesser extent in Tohoku. Small areas of white birch can be found throughout Japan, so use this information primarily to help assist your region guess.","NOTE: Japanese Beech is another species of tree found in Japan. They, however, have more [grey and spotted bark](https://goo.gl/maps/pA6yUwusCcRfxnSz9), as opposed to the mostly white Japanese White Birch."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/72.png","imageLink":"https://goo.gl/maps/w7LrfneqvpeK7MYeA","alt":"","width":0.573},"text":["In general, bamboo grows more often in the **south**, and slowly decreases further north. Population size and areas where it grows can vary, so use this information primarily in helping assist your region guess."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/73.png","imageLink":"https://goo.gl/maps/AqFFzB9p2rcF2t7b6","alt":"","width":0.573},"text":["Chinese Silver Grass, referred to as Kyushu grass, is indeed very abundant on the island of **Kyushu**. However, use this tip with caution, as they can be seen outside of this area.","NOTE: Another notable region they can be found in is the prefectures of Niigata, Yamagata and Akita. Though, combining the rather large quantity found on Kyushu, its normally distinct vegetation, along with other information, there often will be a clear distinction."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/76.png","imageLink":"https://maps.app.goo.gl/ftoSxuUWWaNza7tXA","alt":"","width":0.573},"text":["**Sugarcane** is almost exclusively found on the islands in southern Kyushu and Okinawa."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/74.png","imageLink":"https://maps.app.goo.gl/HVCZxBsD4w4nbNwm9","alt":"","width":0.573},"text":["Hokkaido has very **limited** winter and snow coverage. Unless you are certain, it is often better not to guess this prefecture. Though, if you do find yourself in Hokkaido, these regions are most likely. Other low amounts of miscellaneous coverage is primarily in the southern half of the island."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/75.png","imageLink":"https://goo.gl/maps/MhhgaQ7K5CSiDFUC6","alt":"","width":0.573},"text":["Japan is notably a very mountainous country. However, there are some regions that are quite **flat**, being the Nobi and Kanto **plains**. While at times they can look very similar, determining that it is one or the other can be very helpful.","NOTE: While there are, of course, other flat areas in Japan, these two are the most recognizable."]}}]},{"kind":"tip","title":"Spotlight","items":[{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/78.png","imageLink":"https://goo.gl/maps/2mR9bPLcbSuzYBNY7","alt":"","width":0.573},"text":["You can find these ‘[Shisa](https://goo.gl/maps/q8uCFQh6YheQ7BdU8)’ guardian lions and house plaques with these [specific characters](https://goo.gl/maps/8sY6Txd3QyUTAKWG8) in Okinawa. The colour and shapes of both can vary."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/79.png","imageLink":"https://maps.app.goo.gl/gXn7tDa17k1ZSeyU7","alt":"","width":0.573},"text":["Agricultural fields with red soil are commonly found on several southern islands, most notably on the islands of [Miyakojima ](https://maps.app.goo.gl/p3GiNrHi8rpRptJRA)and [Ishigaki](https://maps.app.goo.gl/DLokgg7yYsaN5yev5) in southern Okinawa."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/80.png","imageLink":"https://goo.gl/maps/Uuo6KyoAEdqXgH1z9","alt":"","width":0.573},"text":["**Mount Fuji** is the tallest mountain in Japan, with a gradual incline and often snowy summit.","Depending on the elevation, it can be seen from far away. This can create some excellent region guesses, especially if you account for direction and distance."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/Tokyo_Manhole_cover.png","imageLink":"https://maps.app.goo.gl/MaparuZdNYvsZSUy7","alt":"","width":0.573},"text":["**Tokyo City **features a nice manhole design**, **with a** 5 petal flower** and many small circles on the outside."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/81.png","imageLink":"https://goo.gl/maps/Y1a8eq92gw41hKp1A","alt":"","width":0.573},"text":["**Cyrillic **can be found on signs in the cities of Wakkanai and Nemuro, in northern Hokkaido."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/82.png","imageLink":"https://maps.app.goo.gl/HnmwJN3dPqd46vj18","alt":"","width":0.573},"text":["These artistically painted poles, made to resemble **birch trees**, are unique to the city of Date in Hokkaido."]}},{"kind":"tip","data":{"image":{"imageUrl":"/images/japan/83.png","imageLink":"https://maps.app.goo.gl/EvybAqsgtmCheR3D9","alt":"","width":0.573},"text":["There are a variety of **trekkers and tripods**, covering a vast amount of locations which span over multiple prefectures and regions.","_Due to the enormous volume of information on this topic, and it being too large to be contained in this guide, we recommend this [resource ](https://docs.google.com/document/d/1aw4BL8DRiwLA59pK7_0MX6d70m5xj9uyd21oDqAlGzw/edit)to learn more about the various trekkers._"]}}]},{"kind":"map","title":"Maps and resources","text":["GeoGuessr’s own official Japan map is not very focused on information that will help you determine the region or prefecture. Plonk It recommends the following maps instead:","- **A Balanced Japan **([map link](https://www.geoguessr.com/maps/631a309ba54a618fca31960a)) - Over 100,000 ai generated locations on intersections from all over Japan.","In addition, here are some resources to help you practice Japan:","- **Plonk It Japan **([map link](https://www.geoguessr.com/maps/6671f4a64f069aadb89e86b9)) - Play this map to study the step 2 and 3 tips from this guide.","- **Prefectures of Japan **([quiz link](https://www.sporcle.com/games/g/japanprefectures)) - Familiarise yourself with the prefectures of Japan with this quiz.","- **Prefecture kanji quiz** ([quiz link](https://www.purposegames.com/game/japans-prefectures-in-kanji-quiz)) - Learn the kanji for each Japanese prefecture"]}],"draftChangelog":[]},"communityDocs":["[No Nonsense Guide To Japan](https://docs.google.com/document/d/1Ob404T3HatGRWOG0L15nfFXuuV0FmQpEsSF80J3e0Tg) by tallskill","[A Japan Guide](https://docs.google.com/document/d/1Pm4qV16U5Yp4xMP4PnR_AUY4Td1aB0kPoCEzNRN2ESU/edit?usp=sharing) by Fanty","[GeoGuessr Japan Guide](https://docs.google.com/document/d/1s0dnGeTBG-ZmlGyaj95N-sqeIIWMXLc3SPfDN3Egty4/edit) by DazaiNLH","[Japan Prefecture Tips](https://www.scribblemaps.com/maps/view/Japan-Prefecture-Tips/3cptmvLxxV) by Alok and others","[Guide to Regional Plates on Japanese Utility Poles](https://docs.google.com/document/d/16lVvh3sLCnHLh_itpEsvXrHHCR_EPzArBmb4bg6TUTU/edit) by shinraFN","[Pole Tops](https://docs.google.com/document/d/14rmfw7gU5L_4S43ED1ixEamZ1acZ0P0DWnYntVIc2F8/edit) by DazaiNLH","[More Japan Pole Metas](https://docs.google.com/document/d/1kQaoTrHfnNhFanc_j8laZbx-x5X7z0KWJwzL9LeIODY/edit) by tallskill, brikiiee and sound of silence","[Japan guardrail bands](https://docs.google.com/document/d/1-VCe8gP5lVNqqXrBbr69xCVw2G_PLplDqbA0H0gsi5c/edit) by brikiiee","[Hexagon road sign designs](https://docs.google.com/document/d/1-QII0wArKeVrbuLZ7mNYTLMOB7-I6uiDkKOtsV58sIU/edit?usp=sharing) by MatePotato","[Japan back of sign](https://docs.google.com/presentation/d/1IRqentsfLwQLCHr35Hoz-sTXeGbp5UksQd-zCrb22iE/edit) by brikiiee and soundofsilence","[NMPZ Drainspotting in Japan](https://docs.google.com/document/d/1Xc_KTqYffNvo4cIFfPghK3SdGtfQRxENq1NOfSAxtqk/edit) by moodeuce","[Trekker Coverage in Japan](https://docs.google.com/document/d/1aw4BL8DRiwLA59pK7_0MX6d70m5xj9uyd21oDqAlGzw/edit) by shinraFN"]}}
